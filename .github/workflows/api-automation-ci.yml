name: Enterprise API Regression Suite CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  automation-execution:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set Up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Run RestAssured Automated Regression Suite
      run: mvn clean test

    - name: Publish Test Execution Report HTML
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cucumber-html-reports
        path: target/cucumber-reports/
        retention-days: 7